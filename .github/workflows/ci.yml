name: Monorepo CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Backend CI (Python Lint & Test)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: collective_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r apps/backend/requirements.txt
        pip install ruff pytest httpx pytest-asyncio

    - name: Lint with Ruff
      run: |
        ruff check apps/backend --exclude=alembic

    - name: Check code formatting
      run: |
        ruff format --check apps/backend --exclude=alembic

    - name: Run Backend Tests
      env:
        DATABASE_URL: sqlite+aiosqlite:///:memory:
        REDIS_URL: redis://localhost:6379/0
        SECRET_KEY: testsecretkey1234567890testsecretkey
        ENVIRONMENT: development
      run: |
        pytest apps/backend/ -v

  frontend-build:
    name: Frontend CI (Lint & Build Verification)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd apps/frontend
        npm ci

    - name: Type check TypeScript
      run: |
        cd apps/frontend
        npm run build --noEmit || npx tsc --project tsconfig.json --noEmit

    - name: Build Application
      run: |
        cd apps/frontend
        npm run build
