services:
  - type: web
    name: embedded-collective-backend
    env: docker
    dockerfilePath: Dockerfile
    plan: starter
    region: oregon
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: "Embedded Collective <m.harit04@gmail.com>"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: embedded-collective-uploads
      - key: ADMIN_EMAIL
        value: herry.pvt.hm@gmail.com
      - key: ALLOWED_ORIGINS
        value: "https://haritmandaliya.vercel.app,https://haritmandaliya-portfolio.vercel.app"
