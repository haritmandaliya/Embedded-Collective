version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: embedded-collective-db
    environment:
      POSTGRES_DB: collective
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: embedded-collective-redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: embedded-collective-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/collective
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: supersecretkeychangeinproduction1234567890
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    restart: always

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: embedded-collective-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
